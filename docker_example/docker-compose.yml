services:
  langflow:
    image: 'langflowai/langflow:latest'
    pull_policy: always
    user: root  # Indispensable pour tes permissions actuelles
    ports:
      - '7860:7860'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - 'LANGFLOW_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}'
      - LANGFLOW_CONFIG_DIR=/app/langflow
      - LANGFLOW_HOST=0.0.0.0
      - LANGFLOW_PORT=7860
      # --- AJOUTS SÉCURITÉ NEXUS ---
      - LANGFLOW_AUTO_LOGIN=false
      - LANGFLOW_SUPERUSER=${LANGFLOW_SUPERUSER}
      - LANGFLOW_SUPERUSER_PASSWORD=${LANGFLOW_SUPERUSER_PASSWORD}
      # --- CHROMA PERSISTANCE ---
      - LANGFLOW_CHROMA_PERSIST_DIRECTORY=/app/chroma_db
    labels:
      - "coolify.proxy.port=7860"
    volumes:
      - 'langflow-data:/app/langflow'
      - 'langflow-chroma:/app/chroma_db'
    restart: unless-stopped
  postgres:
    image: 'postgres:16'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - 'langflow-postgres:/var/lib/postgresql/data'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  langflow-postgres:
  langflow-data:
  langflow-chroma:
